<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Magazine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="magazine-grid">
        <header class="site-header">
            <nav>
                <h1>Daily Grid</h1>
                <ul>
                    <li>Home</li>
                    <li>Tech</li>
                    <li>Design</li>
                    <li>Contact</li>
                </ul>
            </nav>
        </header>

        <main class="main-content">
            <h2>Featured Articles</h2>
            <div class="articles-grid">
                <article class="article-card">
                    <img src="https://picsum.photos/id/1018/400/300" alt="Article 1">
                    <h3>Grid Layouts Explained</h3>
                    <p>Master CSS Grid in 30 minutes.</p>
                </article>
            </div>
        </main>

        <aside class="sidebar">
            <h3>Trending</h3>
            <ul>
                <li>CSS Tips</li>
                <li>Web Design 2026</li>
                <li>Responsive Grids</li>
            </ul>
            <div class="promo-badge">NEW</div>
        </aside>

        <footer class="site-footer">
            <div class="footer-col">
                <h4>About</h4>
                <p>CSS Grid Magazine</p>
            </div>
            <div class="footer-col">
                <h4>Links</h4>
                <p>Privacy | Terms</p>
            </div>
            <div class="footer-col">
                <h4>Social</h4>
                <p>Twitter | GitHub</p>
            </div>
        </footer>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Magazine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
               /* Requirement 1: Grid Template Areas - Mobile First */
        .magazine-grid {
            display: grid;
            gap: 20px;
            min-height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            
            grid-template-areas: 
                "header"
                "main"
                "sidebar"
                "footer";
            grid-template-columns: 1fr;
        }

        .site-header { 
            grid-area: header; 
            background: #333; 
            color: white; 
            padding: 1rem 2rem;
            border-radius: 8px;
        }

        .site-header nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-header ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .site-header a {
            color: white;
            text-decoration: none;
        }

        .main-content { 
            grid-area: main; 
        }

        .main-content h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        .articles-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr;
            grid-auto-flow: dense;
        }

        .article-card {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: grid;
            gap: 10px;
        }

        .article-card img {
            width: 100%;
            border-radius: 4px;
        }

        .sidebar { 
            grid-area: sidebar; 
            background: white; 
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
        }

        .promo-badge {
            position: absolute;
            top: -10px;
            right: 20px;
            z-index: 10;
            background: #ff6b6b;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        .site-footer { 
            grid-area: footer; 
            background: #222; 
            color: white;
            padding: 2rem;
            border-radius: 8px;
            display: grid;
            gap: 30px;
            grid-template-columns: 1fr;
            justify-items: center;
            text-align: center;
        }

        /* Requirement 2: Tablet Layout 768px+ */
        @media (min-width: 768px) {
            .magazine-grid {
                grid-template-areas: 
                    "header  header"
                    "main    sidebar"
                    "footer  footer";
                grid-template-columns: 2fr 1fr;
            }
            
            .articles-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .site-footer {
                grid-template-columns: repeat(3, 1fr);
                justify-items: start;
                text-align: left;
            }
        }

        /* Requirement 2: Desktop Layout 1024px+ */
        @media (min-width: 1024px) {
            .magazine-grid {
                grid-template-areas: 
                    "header  header  header"
                    "main    main    sidebar"
                    "footer  footer  footer";
                grid-template-columns: 1fr 1fr 1fr;
            }
            
            .articles-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

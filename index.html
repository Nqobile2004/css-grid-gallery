<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>My Photo Gallery</h1>
    
    <div class="gallery">
        <div class="gallery-item featured">
            <img src="https://picsum.photos/id/1015/400/300" alt="Mountain landscape">
            <div class="overlay">Featured: Mountain View</div>
        </div>
        
        <div class="gallery-item">
            <img src="https://picsum.photos/id/104/400/300" alt="Waterfall">
            <div class="overlay">Waterfall</div>
        </div>
        
        <div class="gallery-item">
            <img src="https://picsum.photos/id/106/400/300" alt="Flower">
            <div class="overlay">Flower</div>
        </div>
        
        <div class="gallery-item">
            <img src="https://picsum.photos/id/107/400/300" alt="Grass">
            <div class="overlay">Grass</div>
        </div>
        
        <div class="gallery-item">
            <img src="https://picsum.photos/id/116/400/300" alt="Beach">
            <div class="overlay">Beach</div>
        </div>
        
        <div class="gallery-item">
            <img src="https://picsum.photos/id/119/400/300" alt="Mountain lake">
            <div class="overlay">Mountain Lake</div>
        </div>
    </div>
</body>
</html>
